model:
  model_id: Qwen/Qwen2-VL-2B-Instruct
  device: auto
  dtype: auto
  max_steps: 8
  region_window: 2
  max_answer_tokens: 16
  action_selection: sample
  controller_temperature: 3.0
  pooling: mean
  use_control_tokens: false
  think_append_hidden: true
  controller_context_window: 3

dataset:
  type: m3cot
  name: LightChen2333/M3CoT
  split: train
  limit:
  require_image: true
  max_latent_stage: 20

phase2:
  seed: 42
  selection_delta: 0.03
  patch_k_choices: [1, 2, 3, 4]
  max_steps: 8
  image_size: 280
  output_path: outputs/phase2_m3cot_traces.jsonl
  initial_visual_mode: global_mean

train:
  seed: 42
  learning_rate: 0.0001
  weight_decay: 0.0
  num_epochs: 1
  group_size: 4
  max_examples:
  grad_clip_norm: 1.0
  log_every: 10
  output_dir: outputs/train_m3cot

inference:
  limit:
  output_path: outputs/m3cot_pooling_predictions.jsonl

debug:
  index: 0
