model:
  model_id: Qwen/Qwen2-VL-2B-Instruct
  device: auto
  dtype: auto
  max_steps: 8
  region_window: 2
  max_answer_tokens: 16
  action_selection: sample
  controller_temperature: 3.0
  pooling: mean
  use_control_tokens: false
  think_append_hidden: true

dataset:
  type: scienceqa
  name: derek-thomas/ScienceQA
  split: train
  limit:
  require_image: true

train:
  seed: 42
  learning_rate: 0.0001
  weight_decay: 0.0
  num_epochs: 1
  group_size: 4
  max_examples:
  grad_clip_norm: 1.0
  log_every: 10
  output_dir: outputs/train_scienceqa
  dataset_partition: train

inference:
  limit:
  output_path: outputs/scienceqa_pooling_predictions.jsonl
  dataset_partition: test

debug:
  index: 0
